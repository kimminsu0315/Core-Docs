<!DOCTYPE html>
<html lang="{{ site.lang | default: "ko-KR" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="container-lg px-3 my-5 markdown-body">
      {% if site.title %}
        <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
      {% endif %}

      {{ content }}

      <!-- 푸터 영역: 가장 대중적이고 깔끔한 기업/오픈소스 문서 스타일 -->
      <footer class="footer border-top text-gray pt-3" style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #E8E6DC; font-size: 13px; color: #8A8780; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <div>
          <span>© 2026 Core. All rights reserved.</span>
        </div>
        <div style="display: flex; gap: 15px;">
          <a href="{{ "/" | relative_url }}" style="color: #CC785C; text-decoration: none;">문서 홈</a>
          <a href="https://github.com/kimminsu0315/Project_Core" target="_blank" rel="noopener noreferrer" style="color: #CC785C; text-decoration: none;">GitHub</a>
        </div>
      </footer>
    </div>
  </body>
</html>
