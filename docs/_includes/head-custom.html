<style>
/* ============================================================
   head-custom.css — 문서 페이지 스타일 (테마 + TOC 사이드바 + 반응형)
   local-folder-viewer 스킬. primer.css(마크다운 베이스) 위에 얹힘.
   색·폰트는 Claude 톤. 문서 페이지가 assets/ 기준 상대경로로 링크.

/* ---- Primer 유틸 대체 (github-markdown-css엔 레이아웃 유틸 없음) ---- */
.container-lg { max-width: 1012px; margin-left: auto; margin-right: auto; }

.my-5 { margin-top: 24px !important; margin-bottom: 24px !important; }

/* ============================================
   코드블록 D2Coding 폰트 (한글 모노스페이스)
   ============================================
   코드블록에 ASCII 박스(┌─│┐)와 한글을 섞은 UI 모형이 정합돼 보이려면
   ASCII=1폭·한글=2폭 가정이 지켜져야 한다. 시스템 한글 폰트는 한글이
   약 2.05~2.10폭이라 세로선(│)이 미세하게 어긋난다. Naver D2Coding은
   한글을 ASCII의 정확히 2배 폭으로 그려 어긋남이 없다. 코드블록에만
   적용하고 본문 폰트는 그대로 둔다. 라이선스: SIL OFL 1.1.
   ============================================ */
@font-face {
  font-family: 'D2Coding';
  src: url('{{ "/fonts/D2Coding.woff2" | relative_url }}') format('woff2');
  font-display: swap;
}

/* ============================================

   ============================================ */
body { background: #FAF9F5 !important; color: #2C2B28 !important; }

/* 데스크탑 — 사이드바 펼침 기본 */

<script>
/* ============================================================
   head-custom.js — 문서 페이지 스크립트 (TOC 사이드바 + 햄버거 + mermaid)
   local-folder-viewer 스킬 v1.6
   ============================================================ */
document.addEventListener('DOMContentLoaded', function () {

  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({
      startOnLoad: false, theme: 'default', maxTextSize: 100000, maxEdges: 1000,
      securityLevel: 'loose', flowchart: { htmlLabels: true, useMaxWidth: true, curve: 'basis' }
    });
    document.querySelectorAll('pre > code.language-mermaid').forEach(function (codeEl) {
      var div = document.createElement('div'); div.className = 'mermaid';
      div.textContent = codeEl.textContent; codeEl.parentElement.replaceWith(div);
    });
    try { mermaid.run({ querySelector: '.mermaid' }); } catch (e) {}
  }

  var content = document.querySelector('.markdown-body');
  if (!content) return;
  removeBuiltInToc(content);

  var headers = content.querySelectorAll('h1[id], h2[id], h3[id]');

  // 사이드바는 항상 렌더 (목차 없어도 홈·햄버거는 일관되게)
  var sidebar = buildSidebar(headers);
  document.body.appendChild(sidebar);
  document.body.classList.add('has-toc-sidebar');
  setupMobileToggle(sidebar);
  setupScrollHide();
  setupKeyboard();
  document.body.classList.add('toc-open');

  if (headers.length >= 2) {
    setupToggles(sidebar);
    setupHeaderClickToggle(sidebar);
    setupOutlineToggle(sidebar);
    setupScrollspy(sidebar, headers);
    collapseToOutline(sidebar);   // 진입 = 개요(섹션 보이고 소제목만 접힘)
    syncOutlineLabel(sidebar);
    if (window.__updateScrollspy) window.__updateScrollspy();
  }
});


// ===== 공용 헬퍼 =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function itemToggle(li) { return li.querySelector(':scope > .toc-row > .toc-toggle'); }
function collapsibleItems(sidebar) {
  return Array.prototype.filter.call(sidebar.querySelectorAll('.toc-item'), function (li) {
    var t = itemToggle(li); return t && !t.classList.contains('empty');
  });
}
function setCollapsed(li, collapsed) {
  var t = itemToggle(li);
  if (!t || t.classList.contains('empty')) return;
  li.classList.toggle('collapsed', collapsed);
  t.innerHTML = collapsed ? '▸' : '▾';
}
function itemLevel(li) { var m = (li.className || '').match(/toc-h(\d)/); return m ? parseInt(m[1], 10) : 0; }
// 섹션 깊이 = 2개 이상 나오는 최상위 헤더 레벨
function sectionDepthOf(sidebar) {
  for (var L = 1; L <= 6; L++) { if (sidebar.querySelectorAll('.toc-h' + L).length >= 2) return L; }
  return null;
}
// 접을 대상 = 섹션 깊이 항목 중 자식(소제목) 있는 것
function subTargets(sidebar) {
  var d = sectionDepthOf(sidebar);
  if (d === null) return [];
  return collapsibleItems(sidebar).filter(function (li) { return itemLevel(li) === d; });
}
// 개요로: 섹션 위(상위)는 펼치고 섹션 깊이만 접어 소제목 숨김 (섹션은 항상 보임)
function collapseToOutline(sidebar) {
  var d = sectionDepthOf(sidebar);
  if (d === null) return;
  collapsibleItems(sidebar).forEach(function (li) {
    var lv = itemLevel(li);
    if (lv < d) setCollapsed(li, false);
    else if (lv === d) setCollapsed(li, true);
  });
}
// 목차 버튼 라벨 = 소제목 접힘 상태 반영 (접을 소제목 없으면 버튼 숨김)
function syncOutlineLabel(sidebar) {
  var btn = sidebar.querySelector('.toc-outline-toggle');
  if (!btn) return;
  var t = subTargets(sidebar);
  if (!t.length) { btn.style.display = 'none'; return; }
  var allCol = t.every(function (li) { return li.classList.contains('collapsed'); });
  btn.textContent = allCol ? '목차 펼치기' : '목차 접기';
}


// ===== 모바일 햄버거 =====
function setupMobileToggle(sidebar) {
  var hamburger = document.createElement('button');
  hamburger.className = 'toc-hamburger';
  hamburger.setAttribute('aria-label', '목차 열기/닫기');
  hamburger.innerHTML = '☰';
  document.body.appendChild(hamburger);
  var dim = document.createElement('div'); dim.className = 'toc-dim'; document.body.appendChild(dim);
  hamburger.addEventListener('click', function () {
    if (window.matchMedia('(max-width: 1100px)').matches) document.body.classList.toggle('toc-open');
    else document.body.classList.remove('toc-collapsed-desktop');
  });
  dim.addEventListener('click', function () { document.body.classList.remove('toc-open'); });
}

// ===== 본문 ## 목차 제거 =====
function removeBuiltInToc(content) {
  var all = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
  var tocHeader = null;
  for (var i = 0; i < all.length; i++) {
    var text = all[i].textContent.trim();
    if (text === '목차' || text === 'Table of Contents' || text === 'TOC') { tocHeader = all[i]; break; }
  }
  if (!tocHeader) return;
  var lv = parseInt(tocHeader.tagName.charAt(1), 10);
  var cur = tocHeader.nextElementSibling;
  while (cur) {
    if (/^H[1-6]$/.test(cur.tagName)) { var curLv = parseInt(cur.tagName.charAt(1), 10); if (curLv <= lv) break; }
    var next = cur.nextElementSibling; cur.remove(); cur = next;
  }
  tocHeader.remove();
}

// ===== 사이드바 DOM (목차<2 면 '목차 없음') =====
function buildSidebar(headers) {
  var sidebar = document.createElement('nav'); sidebar.className = 'toc-sidebar';

  var topBar = document.createElement('div'); topBar.className = 'toc-top-bar';
  var collapseBtn = document.createElement('button');
  collapseBtn.className = 'toc-collapse-btn';
  collapseBtn.setAttribute('aria-label', '사이드바 접기');
  collapseBtn.innerHTML = '‹';
  collapseBtn.addEventListener('click', function () { document.body.classList.add('toc-collapsed-desktop'); });
  topBar.appendChild(collapseBtn); sidebar.appendChild(topBar);

  var homeHref = (typeof window.VIEWER_HOME === 'string' && window.VIEWER_HOME) ? window.VIEWER_HOME : './';
  var homeLabel = (typeof window.VIEWER_TITLE === 'string' && window.VIEWER_TITLE) ? window.VIEWER_TITLE : '홈';
  var homeBtn = document.createElement('a'); homeBtn.className = 'toc-home-btn'; homeBtn.href = homeHref;
  homeBtn.innerHTML = '<span class="toc-home-icon">⌂</span><span>' + escapeHtml(homeLabel) + '</span>';
  sidebar.appendChild(homeBtn);

  if (headers.length < 2) {
    var none = document.createElement('div');
    none.className = 'toc-empty';
    none.textContent = '(목차 없음)';
    sidebar.appendChild(none);
    return sidebar;
  }

  var headerRow = document.createElement('div'); headerRow.className = 'toc-header-row';
  var title = document.createElement('div'); title.className = 'toc-title'; title.textContent = '목차'; headerRow.appendChild(title);
  var outlineBtn = document.createElement('button'); outlineBtn.className = 'toc-outline-toggle'; outlineBtn.textContent = '목차 접기'; headerRow.appendChild(outlineBtn);
  sidebar.appendChild(headerRow);

  var rootList = document.createElement('ul'); rootList.className = 'toc-list'; sidebar.appendChild(rootList);
  var stack = [{ level: 0, list: rootList }];
  headers.forEach(function (h) {
    var level = parseInt(h.tagName.charAt(1), 10);
    while (stack.length > 1 && stack[stack.length - 1].level >= level) stack.pop();
    var parentList = stack[stack.length - 1].list;
    var li = document.createElement('li'); li.className = 'toc-item toc-h' + level;
    var row = document.createElement('div'); row.className = 'toc-row';
    var toggle = document.createElement('span'); toggle.className = 'toc-toggle empty'; toggle.innerHTML = '▾'; row.appendChild(toggle);
    var a = document.createElement('a'); a.href = '#' + h.id; a.textContent = h.textContent.trim(); a.dataset.target = h.id; row.appendChild(a);
    li.appendChild(row);
    var sublist = document.createElement('ul'); sublist.className = 'toc-sublist'; sublist.style.display = 'none'; li.appendChild(sublist);
    parentList.appendChild(li);
    var parentEntry = stack[stack.length - 1];
    if (parentEntry.toggle) { parentEntry.toggle.classList.remove('empty'); parentEntry.sublist.style.display = ''; }
    stack.push({ level: level, list: sublist, toggle: toggle, sublist: sublist, li: li });
  });
  return sidebar;
}

// ===== 개별 노드 토글 =====
function setupToggles(sidebar) {
  sidebar.querySelectorAll('.toc-toggle').forEach(function (toggle) {
    toggle.addEventListener('click', function (e) {
      if (toggle.classList.contains('empty')) return;
      e.preventDefault(); e.stopPropagation();
      var li = toggle.closest('.toc-item');
      var collapsed = li.classList.toggle('collapsed');
      toggle.innerHTML = collapsed ? '▸' : '▾';
      syncOutlineLabel(sidebar);
      if (window.__updateScrollspy) window.__updateScrollspy();
    });
  });
}
function setupHeaderClickToggle(sidebar) {
  sidebar.querySelectorAll('.toc-row > a').forEach(function (a) {
    a.addEventListener('click', function () {
      var li = a.closest('.toc-item');
      var toggle = itemToggle(li);
      if (!toggle || toggle.classList.contains('empty')) return;
      var collapsed = li.classList.toggle('collapsed');
      toggle.innerHTML = collapsed ? '▸' : '▾';
      syncOutlineLabel(sidebar);
      if (window.__updateScrollspy) window.__updateScrollspy();
    });
  });
}

// ===== 목차 접기/펼치기 (단일 버튼, 소제목 없으면 숨김) =====
function setupOutlineToggle(sidebar) {
  var btn = sidebar.querySelector('.toc-outline-toggle');
  if (!btn) return;
  if (!subTargets(sidebar).length) { btn.style.display = 'none'; return; }
  btn.addEventListener('click', function () {
    var t = subTargets(sidebar);
    var allCol = t.length > 0 && t.every(function (li) { return li.classList.contains('collapsed'); });
    if (allCol) {
      collapsibleItems(sidebar).forEach(function (li) { setCollapsed(li, false); }); // 펼치기: 전체
    } else {
      collapseToOutline(sidebar);                                                    // 접기: 개요
    }
    syncOutlineLabel(sidebar);
    if (window.__updateScrollspy) window.__updateScrollspy();
  });
  syncOutlineLabel(sidebar);
}

// ===== Scrollspy — 접힘 시 보이는 상위 섹션 하이라이트 =====
function setupScrollspy(sidebar, headers) {
  var links = sidebar.querySelectorAll('.toc-row > a');
  function linkFor(id) { for (var i = 0; i < links.length; i++) { if (links[i].dataset.target === id) return links[i]; } return null; }
  function visibleLink(a) {
    while (a && a.offsetParent === null) {
      var li = a.closest('.toc-item');
      var sub = li && li.parentElement;
      var pli = sub && sub.closest('.toc-item');
      a = pli ? pli.querySelector(':scope > .toc-row > a') : null;
    }
    return a;
  }
  function updateActive() {
    var scrollY = window.scrollY + 120;
    var activeId = null;
    for (var i = 0; i < headers.length; i++) {
      var top = headers[i].getBoundingClientRect().top + window.scrollY;
      if (top <= scrollY) activeId = headers[i].id; else break;
    }
    var targetA = activeId ? visibleLink(linkFor(activeId)) : null;
    links.forEach(function (a) { if (a === targetA) a.classList.add('active'); else a.classList.remove('active'); });
  }
  window.addEventListener('scroll', updateActive, { passive: true });
  window.addEventListener('resize', updateActive, { passive: true });
  window.__updateScrollspy = updateActive;
  updateActive();
}

// ===== 햄버거 스크롤 숨김 =====
function setupScrollHide() {
  var prevY = window.scrollY;
  window.addEventListener('scroll', function () {
    var y = window.scrollY;
    if (y < 80) document.body.classList.remove('scroll-down');
    else if (y > prevY + 5) document.body.classList.add('scroll-down');
    else if (y < prevY - 5) document.body.classList.remove('scroll-down');
    prevY = y;
  }, { passive: true });
}

// ===== 키보드 =====
function setupKeyboard() {
  document.addEventListener('keydown', function (e) {
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    var el = e.target; var tag = (el && el.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select' || (el && el.isContentEditable)) return;
    if (e.key === 't' || e.key === 'T') {
      if (!document.querySelector('.toc-sidebar')) return;
      if (window.matchMedia('(max-width: 1100px)').matches) document.body.classList.toggle('toc-open');
      else document.body.classList.toggle('toc-collapsed-desktop');
    } else if (e.key === 'Escape') { document.body.classList.remove('toc-open'); }
  });
}
